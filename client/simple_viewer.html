<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jetson Stream Viewer</title>
  <style>
    html, body { margin: 0; background: #111; color: #eee; font-family: system-ui, sans-serif; }
    header { padding: 10px 14px; background: #1d1d1d; display: flex; justify-content: space-between; gap: 12px; }
    img { width: 100vw; height: calc(100vh - 44px); object-fit: contain; background: #000; }
    input { width: min(560px, 50vw); }
  </style>
</head>
<body>
  <header>
    <strong>Jetson Stream Viewer</strong>
    <label>Stream URL <input id="url" value="http://127.0.0.1:8080/video.mjpg"></label>
  </header>
  <img id="stream" src="http://127.0.0.1:8080/video.mjpg" alt="MJPEG stream">
  <script>
    const input = document.getElementById("url");
    const stream = document.getElementById("stream");
    input.addEventListener("change", () => {
      stream.src = input.value;
    });
  </script>
</body>
</html>
